# Phase-1 kernel smoke: build paideia-as submodule, build the kernel,
# boot under QEMU, verify exit clean.
#
# Status: workflow checked in but dormant until GitHub Actions billing
# restores (see paideia-as/design/toolchain/phase-transition-3.md §5
# carryover — the "workflow re-enablement" item).
#
# Local run protocol (until CI re-enables): tools/run-smoke.sh
#   - Skip with exit 77 if qemu absent.
#   - Exit 1 on triple-fault / unexpected qemu rc.
#   - Exit 2 on build failure.

name: Phase-1 smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 build-essential

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tools/paideia-as/target
          key: cargo-${{ runner.os }}-${{ hashFiles('tools/paideia-as/Cargo.lock') }}

      - name: Build paideia-as submodule
        working-directory: tools/paideia-as
        run: cargo build --release -p paideia-as

      - name: Verify paideia-as version
        run: ./tools/find-paideia-as.sh

      - name: Build kernel
        run: ./tools/build.sh

      - name: Smoke test
        run: |
          # tools/run-smoke.sh exits 77 if qemu missing (shouldn't happen on
          # CI runner with apt-get install above), 0 on success, non-zero on
          # boot failure.
          ./tools/run-smoke.sh || rc=$?
          if [ "${rc:-0}" = "77" ]; then
            echo "::warning::qemu absent on CI runner; smoke skipped"
            exit 0
          fi
          exit "${rc:-0}"

      - name: Upload kernel artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-elf
          path: build/kernel.elf
          retention-days: 14
